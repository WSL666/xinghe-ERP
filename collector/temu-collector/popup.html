<!DOCTYPE html>
<html style="width:380px; padding:0; margin:0;">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 12px;
      background: #fff;
    }
    .header {
      text-align: center;
      margin-bottom: 10px;
    }
    .header .icon { width: 28px; height: 28px; object-fit: contain; }
    .header .title { font-size: 15px; font-weight: 700; color: #333; }
    .header .sub { font-size: 11px; color: #999; margin-top: 2px; }

    button {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 600; margin: 5px 0;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    #collectBtn {
      background: linear-gradient(135deg, #fb7701, #ff5722);
      color: #fff; font-size: 15px; padding: 12px;
    }
    #sendPipelineBtn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: none; }

    #result {
      margin-top: 10px; font-size: 12px; max-height: 300px; overflow-y: auto;
      background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #eee;
    }
    #result img { display: inline-block; }
    .btn-row { display: flex; gap: 6px; }
    .btn-row button { flex: 1; }

    /* 店铺配置区 */
    #configSection {
      margin-bottom: 8px; background: #f8f9fa; border-radius: 8px;
      border: 1px solid #e8e8e8; overflow: hidden;
    }
    #configSection .section-title {
      font-size: 12px; font-weight: 600; color: #666; padding: 6px 10px;
      background: #eef1f5; cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 4px;
    }
    #configSection .section-title .arrow {
      transition: transform 0.2s; font-size: 10px;
    }
    #configSection.collapsed .section-title .arrow {
      transform: rotate(-90deg);
    }
    #configSection.collapsed .config-body {
      display: none;
    }

    .config-panel {
      display: none; padding: 4px 10px 8px 10px; border-top: 1px dashed #ddd;
      flex-direction: column; gap: 2px; width: 100%;
    }
    .config-panel.show { display: flex; }
    .config-panel input {
      width: 100%; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 11px; outline: none;
    }
    .config-panel input:focus { border-color: #007bff; }
    .config-panel .save-row { display: flex; gap: 4px; }
    .config-panel .save-row button {
      flex: 1; padding: 5px; font-size: 11px; margin: 0; border-radius: 4px;
    }
    .config-panel .save-row .save-btn { background: #007bff; color: #fff; }
    .config-panel .save-row .cancel-btn { background: #fff; color: #666; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="header">
    <img class="icon" src="tongkuai_image.png" alt="icon">
    <div class="title">通快商品采集助手</div>
    <div class="sub">一键提取商品全部图片 · 基于页面原始数据</div>
  </div>

  <!-- API 密钥配置(默认折叠, 点配置展开) -->
  <div id="configSection" style="margin-bottom:8px;background:#f8f9fa;border-radius:8px;border:1px solid #e8e8e8;overflow:hidden;">
    <!-- 第一行: 密钥标题 + 状态 + 配置按钮 -->
    <div style="display:flex;align-items:center;gap:6px;padding:6px 10px;">
      <span style="font-size:12px;font-weight:600;color:#666;">🔑 API 密钥</span>
      <span id="shop-status" style="font-size:10px;color:#aaa;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">未配置</span>
      <button id="cfg-btn" style="width:auto;padding:3px 10px;font-size:11px;margin:0 0 0 auto;background:#fff;color:#007bff;border:1px solid #007bff;border-radius:4px;white-space:nowrap;">配置</button>
    </div>
    <!-- 展开面板: 输入密钥(默认隐藏) -->
    <div id="key-panel" style="display:none;padding:6px 10px;border-top:1px dashed #ddd;flex-direction:column;gap:5px;">
      <div style="font-size:10px;color:#e74c3c;font-weight:600;">* 必填：从网站「设置 → 插件 API 密钥」复制</div>
      <input type="password" placeholder="粘贴插件 API 密钥" id="shop-api-key" style="width:100%;padding:6px 8px;border:1px solid #e74c3c;border-radius:6px;font-size:11px;outline:none;">
      <div style="display:flex;gap:4px;">
        <button id="cfg-cancel-btn" style="flex:1;padding:5px;font-size:11px;margin:0;border-radius:4px;background:#fff;color:#666;border:1px solid #ddd;">取消</button>
        <button id="shop-save-btn" style="flex:1;padding:5px;font-size:11px;margin:0;border-radius:4px;background:#007bff;color:#fff;border:none;">保存</button>
      </div>
    </div>
    <!-- 金豆余额状态(插件开弹窗查1次, 采集不重复查) -->
    <div style="padding:5px 10px;border-top:1px solid #eee;font-size:11px;">
      <span id="beans-status" style="color:#999;"></span>
    </div>
  </div>

  <button id="collectBtn">📦 采集商品信息</button>

  <div class="btn-row">
    <button id="sendPipelineBtn">🚀 发送到管线</button>
  </div>

  <div id="result">
    <div style="color:#bbb;text-align:center;padding:20px;font-size:12px;">
      打开 Temu 商品详情页<br>点击上方按钮开始采集
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
