<!DOCTYPE html>
<html style="width:380px; padding:0; margin:0;">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 12px;
      background: #fff;
    }
    .header {
      text-align: center;
      margin-bottom: 10px;
    }
    .header .icon { width: 28px; height: 28px; object-fit: contain; }
    .header .title { font-size: 15px; font-weight: 700; color: #333; }
    .header .sub { font-size: 11px; color: #999; margin-top: 2px; }

    button {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 600; margin: 5px 0;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    #collectBtn {
      background: linear-gradient(135deg, #fb7701, #ff5722);
      color: #fff; font-size: 15px; padding: 12px;
    }
    #copyBtn { background: #28a745; color: #fff; display: none; }
    #sendPipelineBtn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: none; }

    #result {
      margin-top: 10px; font-size: 12px; max-height: 300px; overflow-y: auto;
      background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #eee;
    }
    #result img { display: inline-block; }
    .btn-row { display: flex; gap: 6px; }
    .btn-row button { flex: 1; }

    /* 店铺配置区 */
    #configSection {
      margin-bottom: 8px; background: #f8f9fa; border-radius: 8px;
      border: 1px solid #e8e8e8; overflow: hidden;
    }
    #configSection .section-title {
      font-size: 12px; font-weight: 600; color: #666; padding: 6px 10px;
      background: #eef1f5; cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 4px;
    }
    #configSection .section-title .arrow {
      transition: transform 0.2s; font-size: 10px;
    }
    #configSection.collapsed .section-title .arrow {
      transform: rotate(-90deg);
    }
    #configSection.collapsed .config-body {
      display: none;
    }

    .config-panel {
      display: none; padding: 4px 10px 8px 10px; border-top: 1px dashed #ddd;
      flex-direction: column; gap: 2px; width: 100%;
    }
    .config-panel.show { display: flex; }
    .config-panel input {
      width: 100%; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 11px; outline: none;
    }
    .config-panel input:focus { border-color: #007bff; }
    .config-panel .save-row { display: flex; gap: 4px; }
    .config-panel .save-row button {
      flex: 1; padding: 5px; font-size: 11px; margin: 0; border-radius: 4px;
    }
    .config-panel .save-row .save-btn { background: #007bff; color: #fff; }
    .config-panel .save-row .cancel-btn { background: #fff; color: #666; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="header">
    <img class="icon" src="tongkuai_image.png" alt="icon">
    <div class="title">Temu 商品采集助手</div>
    <div class="sub">一键提取商品全部图片 · 基于页面原始数据</div>
  </div>

  <!-- 店铺配置区 -->
  <div id="configSection">
    <div class="section-title" id="configToggle">
      <span class="arrow">▼</span> 🏪 店铺配置
    </div>
    <div class="config-body">
      <!-- 店铺配置 -->
      <div class="shop-config-row" data-shop="1" style="padding:4px 10px;display:flex;align-items:center;gap:6px;border-top:1px solid #eee;font-size:12px;">
        <span class="model-icon">🏪</span>
        <span class="model-name">店铺配置</span>
        <span class="model-status" id="shop-status" style="font-size:10px;color:#aaa;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">未配置</span>
        <button class="cfg-btn shop-cfg-btn" style="width:auto;padding:2px 8px;font-size:11px;margin:0;background:#fff;color:#007bff;border:1px solid #007bff;border-radius:4px;white-space:nowrap;flex-shrink:0;">配置</button>
      </div>
      <!-- 金豆余额状态(插件开弹窗查1次, 采集不重复查) -->
      <div style="padding:3px 10px;border-top:1px solid #eee;font-size:11px;">
        <span id="beans-status" style="color:#999;"></span>
      </div>
      <div class="config-panel shop-panel" id="panel-shop" style="display:none;padding:4px 10px 8px 10px;border-top:1px dashed #ddd;flex-direction:column;gap:2px;width:100%;">
        <div style="font-size:10px;color:#e74c3c;font-weight:600;margin-top:2px;">API密钥（必填）：从网站「设置 → 插件 API 密钥」复制</div>
        <input type="password" placeholder="插件 API 密钥（必填）" id="shop-api-key" style="width:100%;padding:5px 8px;border:1px solid #e74c3c;border-radius:4px;font-size:11px;outline:none;">
        <div class="save-row" style="display:flex;gap:4px;">
          <button class="cancel-btn shop-cancel-btn" style="flex:1;padding:5px;font-size:11px;margin:0;border-radius:4px;background:#fff;color:#666;border:1px solid #ddd;">取消</button>
          <button class="save-btn shop-save-btn" style="flex:1;padding:5px;font-size:11px;margin:0;border-radius:4px;background:#007bff;color:#fff;">保存</button>
        </div>
      </div>

    </div>
  </div>

  <button id="collectBtn">📦 采集商品信息</button>

  <div class="btn-row">
    <button id="copyBtn">📋 复制链接</button>
    <button id="sendPipelineBtn">🚀 发送到管线</button>
  </div>

  <div id="result">
    <div style="color:#bbb;text-align:center;padding:20px;font-size:12px;">
      打开 Temu 商品详情页<br>点击上方按钮开始采集
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
